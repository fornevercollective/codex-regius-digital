name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build Pages artifact (exclude raw PNGs)
        run: bash scripts/build-pages.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: deploy

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4